name: Build & Test cuvis.pyil

on:
  pull_request:

jobs:

  prepare:
    runs-on: ubuntu-latest
    outputs:
      cuvis_version: "3.5.3"
    steps:
      - run: echo "cuvis_version=3.5.3" >> "$GITHUB_OUTPUT"

  build-and-test:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ["22.04", "24.04"]
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        arch:   ["amd64", "arm64"]
        include:
          # numpy pinned per python version
          - { python: "3.9",  numpy: "2.0.0" }
          - { python: "3.10", numpy: "2.0.0" }
          - { python: "3.11", numpy: "2.0.0" }
          - { python: "3.12", numpy: "2.0.0" }
          - { python: "3.13", numpy: "2.1.0" }
          - { python: "3.14", numpy: "2.3.2" }
          # runner + tag_suffix per arch (arm runner label is ubuntu-version-specific)
          - { arch: "amd64",                   runner: "ubuntu-latest",    tag_suffix: ""       }
          - { ubuntu: "22.04", arch: "arm64",  runner: "ubuntu-22.04-arm", tag_suffix: "-arm64" }
          - { ubuntu: "24.04", arch: "arm64",  runner: "ubuntu-24.04-arm", tag_suffix: "-arm64" }

    runs-on: ${{ matrix.runner }}
    container:
      image: cubertgmbh/cuvis_base:${{ needs.prepare.outputs.cuvis_version }}-ubuntu${{ matrix.ubuntu }}${{ matrix.tag_suffix }}
    steps:
      - name: Install system build dependencies
        run: |
          apt-get update
          apt-get install -y software-properties-common gnupg g++ swig cmake

      - name: Add Deadsnakes PPA and install Python ${{ matrix.python }}
        run: |
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update
          apt-get install -y python${{ matrix.python }}-dev python${{ matrix.python }}-venv

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python virtual environment
        run: |
          python${{ matrix.python }} -m venv /tmp/venv
          echo "/tmp/venv/bin" >> "$GITHUB_PATH"

      - name: Install Python build dependencies
        run: |
          pip install --upgrade pip setuptools wheel build
          pip install numpy==${{ matrix.numpy }}

      - name: CMake configure and build
        run: |
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DDOXYGEN_BUILD_DOCUMENTATION=FALSE \
                -DPython_ROOT_DIR=/tmp/venv \
                -B build .
          cmake --build build --target cuvis_pyil --config Release

      - name: Copy built files and install package
        run: |
          chmod +x ./copy_pyil_files.sh
          ./copy_pyil_files.sh build

          # Ubuntu 22.04 needs upgraded packaging tools
          if grep -q 'VERSION_ID="22.04"' /etc/os-release; then
            pip install --upgrade pip setuptools wheel build packaging
          fi

          pip install .

      - name: Smoke test - verify import and version
        run: |
          OUTPUT=$(python -c "from cuvis_il import cuvis_il; print(cuvis_il.cuvis_version_swig())")
          echo "Version output: $OUTPUT"
          echo "$OUTPUT" | grep -q "CUBERT SDK" || (echo "Version check failed!" && exit 1)

  setup-windows-deps:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Cache CUVIS SDK
        id: cache-cuvis
        uses: actions/cache@v4
        with:
          path: C:\Program Files\Cuvis
          key: cuvis-sdk-windows-${{ needs.prepare.outputs.cuvis_version }}

      - name: Download and install CUVIS SDK
        if: steps.cache-cuvis.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          CUVIS_VERSION: ${{ needs.prepare.outputs.cuvis_version }}
        run: |
          $v = $env:CUVIS_VERSION
          $vn = $v -replace '\.', ''
          Invoke-WebRequest "https://cloud.cubert-gmbh.de/s/cuvis_sdk_release_ver_$vn/download" -OutFile cuvis_sdk.zip
          Expand-Archive cuvis_sdk.zip -DestinationPath cuvis_sdk
          $installer = Get-ChildItem "cuvis_sdk\Cuvis $v\" -Recurse -Filter "*.exe" |
                       Where-Object { $_.DirectoryName -match 'Windows' } |
                       Select-Object -First 1
          Write-Output "Installing: $($installer.FullName)"
          Start-Process -Wait -FilePath $installer.FullName -ArgumentList '/S'

  build-and-test-windows:
    needs: [prepare, setup-windows-deps]
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - { python: "3.9",  numpy: "2.0.0" }
          - { python: "3.10", numpy: "2.0.0" }
          - { python: "3.11", numpy: "2.0.0" }
          - { python: "3.12", numpy: "2.0.0" }
          - { python: "3.13", numpy: "2.1.0" }
          - { python: "3.14", numpy: "2.3.2" }
    runs-on: windows-latest

    steps:
      - name: Install SWIG 4.2.1
        shell: pwsh
        run: |
          winget install --id SWIG.SWIG --version 4.2.1 --silent --accept-package-agreements --accept-source-agreements
          $swigPkg = Get-ChildItem "$env:LOCALAPPDATA\Microsoft\WinGet\Packages" -Directory | Where-Object { $_.Name -like "SWIG.SWIG_*" } | Select-Object -First 1
          $swigExe = Get-ChildItem $swigPkg.FullName -Recurse -Filter "swig.exe" | Select-Object -First 1
          echo "SWIG_EXECUTABLE=$($swigExe.FullName)" >> $env:GITHUB_ENV
          echo "SWIG_DIR=$(Join-Path $swigExe.DirectoryName 'Lib')" >> $env:GITHUB_ENV

      - name: Restore CUVIS SDK cache
        uses: actions/cache@v4
        with:
          path: C:\Program Files\Cuvis
          key: cuvis-sdk-windows-${{ needs.prepare.outputs.cuvis_version }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Create venv and install Python build dependencies
        shell: pwsh
        run: |
          python -m venv venv
          .\venv\Scripts\Activate.ps1
          pip install --upgrade pip setuptools wheel build
          pip install numpy==${{ matrix.numpy }}

      - name: CMake configure and build
        shell: pwsh
        run: |
          cmake "-DCMAKE_BUILD_TYPE=Release" "-DDOXYGEN_BUILD_DOCUMENTATION=FALSE" "-DSWIG_DIR=$env:SWIG_DIR" "-DSWIG_EXECUTABLE=$env:SWIG_EXECUTABLE" "-DPython_ROOT_DIR=${{ github.workspace }}\venv" -B build .
          cmake --build build --target cuvis_pyil --config Release

      - name: Copy built files and install package
        shell: bash
        run: |
          chmod +x ./copy_pyil_files.sh
          ./copy_pyil_files.sh build/Release
          source venv/Scripts/activate
          pip install .

      - name: Smoke test - verify import and version
        env:
          CUVIS: C:\Program Files\Cuvis\bin
        shell: bash
        run: |
          source venv/Scripts/activate
          OUTPUT=$(python -c "from cuvis_il import cuvis_il; print(cuvis_il.cuvis_version_swig())")
          echo "Version output: $OUTPUT"
          echo "$OUTPUT" | grep -q "CUBERT SDK" || (echo "Version check failed!" && exit 1)
