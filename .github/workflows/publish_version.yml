name: Build & Publish cuvis.pyil

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      repository:
        description: "Target index"
        type: choice
        options: [pypi, testpypi]
        default: testpypi
      ref:
        description: "Git ref to build (branch/tag/SHA)"
        required: false
        default: ""

concurrency:
  group: pypi-publish
  cancel-in-progress: false

jobs:

  prepare:
    runs-on: ubuntu-latest
    environment: release-gate
    outputs:
      cuvis_version: ${{ steps.tag.outputs.cuvis_version }}
    steps:
      - name: Parse SDK version
        id: tag
        run: |
          TAG="${{ inputs.ref || github.ref_name }}"
          echo "cuvis_version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include: 
          # ── Ubuntu 22.04 ──
          - ubuntu: "22.04"
            python: "3.9"
            numpy: "2.0.0"
            platform_tag: "manylinux_2_35_x86_64"
          - ubuntu: "22.04"
            python: "3.10"
            numpy: "2.0.0"
            platform_tag: "manylinux_2_35_x86_64"
          - ubuntu: "22.04"
            python: "3.11"
            numpy: "2.0.0"
            platform_tag: "manylinux_2_35_x86_64"
          - ubuntu: "22.04"
            python: "3.12"
            numpy: "2.0.0"
            platform_tag: "manylinux_2_35_x86_64"
          - ubuntu: "22.04"
            python: "3.13"
            numpy: "2.1.0"
            platform_tag: "manylinux_2_35_x86_64"
          - ubuntu: "22.04"
            python: "3.14"
            numpy: "2.3.2"
            platform_tag: "manylinux_2_35_x86_64"
 
          # ── Ubuntu 24.04 ──
          - ubuntu: "24.04"
            python: "3.9"
            numpy: "2.0.0"
            platform_tag: "manylinux_2_39_x86_64"
          - ubuntu: "24.04"
            python: "3.10"
            numpy: "2.0.0"
            platform_tag: "manylinux_2_39_x86_64"
          - ubuntu: "24.04"
            python: "3.11"
            numpy: "2.0.0"
            platform_tag: "manylinux_2_39_x86_64"
          - ubuntu: "24.04"
            python: "3.12"
            numpy: "2.0.0"
            platform_tag: "manylinux_2_39_x86_64"
          - ubuntu: "24.04"
            python: "3.13"
            numpy: "2.1.0"
            platform_tag: "manylinux_2_39_x86_64"
          - ubuntu: "24.04"
            python: "3.14"
            numpy: "2.3.2"
            platform_tag: "manylinux_2_39_x86_64"

    runs-on: ubuntu-latest
    container:
      image: cubertgmbh/cuvis_base:${{ needs.prepare.outputs.cuvis_version }}-ubuntu${{ matrix.ubuntu }}

    permissions:
      contents: read
 
    steps:
      - name: Install system build dependencies
        run: |
          apt-get update
          apt-get install -y software-properties-common gnupg g++ swig cmake
 
      - name: Add Deadsnakes PPA and install Python ${{ matrix.python }}
        run: |
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update
          apt-get install -y python${{ matrix.python }}-dev python${{ matrix.python }}-venv
 
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          submodules: recursive
  
      - name: Set up Python virtual environment
        run: |
          python${{ matrix.python }} -m venv /tmp/venv
          echo "/tmp/venv/bin" >> "$GITHUB_PATH"
 
      - name: Install Python build dependencies
        run: |
          pip install --upgrade pip setuptools wheel build
          pip install numpy==${{ matrix.numpy }}
 
      - name: CMake configure and build
        run: |
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DDOXYGEN_BUILD_DOCUMENTATION=FALSE \
                -DPython_ROOT_DIR=/tmp/venv \
                -B build .
          cmake --build build --target cuvis_pyil --config Release
 
      - name: Copy built files and package wheel
        run: |
          rm -rf ./cuvis_il/*cuvis*
          rm -rf ./dist/*.whl
 
          chmod +x ./copy_pyil_files.sh
          ./copy_pyil_files.sh build
 
          python -m build --wheel --no-isolation
 
      - name: Tag wheel with correct Python and platform tags
        run: |
          PYTHON_TAG="py$(echo '${{ matrix.python }}' | tr -d '.')"
          WHEELS=$(find dist -type f -name "*.whl")
          WHEEL_COUNT=$(echo "$WHEELS" | wc -l)
          if [ "$WHEEL_COUNT" -ne 1 ]; then
            echo "Expected exactly 1 wheel, found $WHEEL_COUNT"
            exit 1
          fi
          echo "Tagging $WHEELS with --python-tag=$PYTHON_TAG --platform-tag=${{ matrix.platform_tag }}"
          python -m wheel tags --remove \
            --python-tag="$PYTHON_TAG" \
            --platform-tag=${{ matrix.platform_tag }} \
            "$WHEELS"
 
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-ubuntu${{ matrix.ubuntu }}-py${{ matrix.python }}
          path: dist/*.whl

  preflight:
      needs: [prepare, build]
      runs-on: ubuntu-latest

      permissions:
        contents: read
  
      steps:
        - name: Checkout (for pyproject.toml)
          uses: actions/checkout@v4
          with:
            ref: ${{ inputs.ref || github.ref }}
  
        - name: Read package name/version
          id: meta
          run: |
            python3 - <<'PY'
            import os, sys
            try:
              import tomllib
            except ModuleNotFoundError:
              import tomli as tomllib

            with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
            proj = data["project"]
            with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"name={proj['name']}\n")
              f.write(f"version={proj['version']}\n")
            PY
        - name: Abort if version already exists on target index
          env:
            NAME: ${{ steps.meta.outputs.name }}
            VERSION: ${{ steps.meta.outputs.version }}
            TARGET: ${{ inputs.repository || 'pypi' }}
          run: |
            python3 - <<'PY'
            import json, os, sys, urllib.request, urllib.error
  
            name = os.environ["NAME"]
            version = os.environ["VERSION"]
            target = os.environ["TARGET"]
  
            base = "https://pypi.org/pypi" if target == "pypi" else "https://test.pypi.org/pypi"
            url = f"{base}/{name}/json"
  
            try:
              with urllib.request.urlopen(url) as resp:
                data = json.load(resp)
            except urllib.error.HTTPError as e:
              if e.code == 404:
                print(f"{name} not found on {target}; OK to publish {version}.")
                sys.exit(0)
              raise
  
            releases = data.get("releases", {})
            if version in releases and releases[version]:
              print(f"Version {name}=={version} already exists on {target}. Aborting.")
              sys.exit(1)
  
            print(f"Version {name}=={version} not present on {target}; OK to publish.")
            PY
 
  # ── Publish (trusted publishing via OIDC) ──
  publish:
    needs: [prepare, build, preflight]
    runs-on: ubuntu-latest
 
    environment: ${{ inputs.repository || 'pypi' }}
 
    permissions:
      contents: read
      id-token: write
 
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheel-*
          merge-multiple: true
 
      - name: List wheels to publish
        run: ls -lh dist/
 
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.13.0
        with:
          packages-dir: dist/
          repository-url: >-
            ${{
              github.event_name == 'release'
              && 'https://upload.pypi.org/legacy/'
              || (inputs.repository == 'pypi'
                  && 'https://upload.pypi.org/legacy/'
                  || 'https://test.pypi.org/legacy/')
            }}